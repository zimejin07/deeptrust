# Render Blueprint — connect repo in Render dashboard, or use this for blueprint deploy.
# Render builds from this Dockerfile in the cloud; no local Docker required.
# https://render.com/docs/docker

services:
  - type: web
    name: deeptrust
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: NODE_ENV
        value: production
      # Optional: HF_MODEL, HF_CACHE_DIR for model choice and cache path

    # LLM loads models at runtime; 2GB+ RAM recommended for 360M model
    plan: starter  # or free (512MB; may OOM on model load)
