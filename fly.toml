# Fly.io — deploy with: fly launch (first time) or fly deploy
# They build the image from the Dockerfile in the cloud; no local Docker needed.
# https://fly.io/docs/languages-and-frameworks/dockerfile/

app = "deeptrust"

[build]
  # Uses repo root Dockerfile by default

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

# LLM worker loads models at runtime; 1GB may be tight for 360M, 2GB safer
[vm]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
